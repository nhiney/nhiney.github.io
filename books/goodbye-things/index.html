"lightness\":20,\"foil\":\"#C9A24B\",\"scale\":1.06,\"keyPoints\":{\"en\":[\"Don't criticize, condemn, or complain — it only puts people on the defensive.\",\"Give honest, sincere appreciation; everyone hungers to feel important.\",\"Talk in terms of the other person's interests, and let them do the talking.\",\"Remember a person's name — to them it's the sweetest sound in any language.\",\"To win an argument, avoid it; let the other person save face.\"],\"vi\":[\"Đừng chỉ trích, oán trách hay than phiền — điều đó chỉ khiến người ta phòng thủ.\",\"Hãy khen ngợi thật lòng; ai cũng khao khát cảm giác được coi trọng.\",\"Nói về điều người kia quan tâm, và để họ được nói nhiều hơn.\",\"Nhớ tên một người — với họ đó là âm thanh ngọt ngào nhất.\",\"Muốn thắng tranh cãi thì hãy tránh nó, và giữ thể diện cho đối phương.\"]}},\"enTitle\":\"How to Win Friends and Influence People\",\"titles\":{\"en\":\"How to Win Friends and Influence People\",\"vi\":\"Đắc Nhân Tâm\"},\"descriptions\":{\"en\":\"Một bài chia sẻ bằng tiếng Việt về Đắc Nhân Tâm, nhìn cuốn sách qua giao tiếp, sự chân thành và ranh giới khi tạo ảnh hưởng.\"},\"bodies\":{\"en\":\"$L27\"},\"keyPoints\":{\"en\":\"$1b:props:books:0:meta:keyPoints:en\",\"vi\":\"$1b:props:books:0:meta:keyPoints:vi\"},\"coverNote\":{\"en\":\"$undefined\",\"vi\":\"$undefined\"},\"readingPages\":{\"en\":\"$undefined\",\"vi\":\"$undefined\"},\"pages\":{\"en\":[{\"kind\":\"cover\"},{\"kind\":\"content\",\"paragraphs\":[\"Có những cuốn sách rất dễ bị đọc như một danh sách mẹo. Đắc Nhân Tâm (How to Win Friends and Influence People) cũng dễ rơi vào cảm giác đó nếu tôi chỉ mở nó ra để tìm cách nói sao cho người khác thích mình hơn, hoặc làm sao để một cuộc trò chuyện đi đúng ý mình hơn.\",\"Nhưng tôi muốn nhìn cuốn sách này theo một cách chậm hơn: như một lời nhắc về việc đối diện với người khác bằng sự tử tế, rõ ràng và đủ thành thật. Với tôi, giá trị của những bài học giao tiếp không nằm ở chỗ chúng giúp mình \\\"thắng\\\" trong một cuộc nói chuyện, mà ở chỗ chúng khiến mình ít vô tâm hơn trong cách lắng nghe, phản hồi và tạo ảnh hưởng.\",\"---\"],\"opening\":true},{\"kind\":\"content\",\"paragraphs\":[\"Quan sát: những điều có thể nói chắc\",\"Tôi không muốn biến bài này thành một bản tóm tắt chương hay một bộ trích dẫn rời rạc. Điều chắc nhất trong ghi chú này là tên sách và hướng đọc của tôi: Đắc Nhân Tâm gợi tôi nghĩ về cách con người nói chuyện, lắng nghe, tạo thiện cảm và tạo ảnh hưởng lên nhau.\",\"Với một cuốn sách có tên tiếng Anh là How to Win Friends and Influence People, tôi thấy mình cần đọc chậm. \\\"Ảnh hưởng\\\" không tự động là điều xấu, nhưng nó cần đi cùng sự tôn trọng. Nếu không, mọi lời khuyên giao tiếp rất dễ bị hiểu thành cách làm cho người khác thuận theo mình.\",\"---\"],\"opening\":false},{\"kind\":\"content\",\"paragraphs\":[\"Diễn giải cá nhân: tôi không muốn tách kỹ năng khỏi ý định\",\"Điểm làm tôi chú ý không phải là chuyện phải trở thành một người nói chuyện thật khéo. Tôi quan tâm hơn đến câu hỏi phía sau: nếu biết cách giao tiếp tốt hơn, tôi sẽ dùng điều đó để làm gì?\",\"Một lời nói dễ nghe có thể giúp cuộc trò chuyện nhẹ đi, nhưng cũng có thể trở thành cách né tránh sự thật. Một sự quan tâm đúng lúc có thể khiến người khác thấy được lắng nghe, nhưng cũng có thể bị dùng như một công cụ để lấy thiện cảm. Vì vậy, khi nghĩ về Đắc Nhân Tâm, tôi không muốn tách kỹ năng khỏi ý định.\"],\"opening\":false},{\"kind\":\"end\"}],\"vi\":[{\"kind\":\"cover\"},{\"kind\":\"content\",\"paragraphs\":[\"Có những cuốn sách rất dễ bị đọc như một danh sách mẹo. Đắc Nhân Tâm (How to Win Friends and Influence People) cũng dễ rơi vào cảm giác đó nếu tôi chỉ mở nó ra để tìm cách nói sao cho người khác thích mình hơn, hoặc làm sao để một cuộc trò chuyện đi đúng ý mình hơn.\",\"Nhưng tôi muốn nhìn cuốn sách này theo một cách chậm hơn: như một lời nhắc về việc đối diện với người khác bằng sự tử tế, rõ ràng và đủ thành thật. Với tôi, giá trị của những bài học giao tiếp không nằm ở chỗ chúng giúp mì e is brilliant and polite.\",\"We confront our fears the way Clarice confronts the screaming lambs.\"],\"start\":2,\"opening\":false},{\"kind\":\"list\",\"items\":[\"Evil here is intimate, psychological — never cartoonish.\"],\"start\":4,\"opening\":false},{\"kind\":\"end\"}],\"vi\":[{\"kind\":\"cover\"},{\"kind\":\"list\",\"items\":[\"Một nữ tập sự FBI mặc cả với một con quái vật để truy bắt con quái vật khác.\",\"Lòng can đảm thầm lặng của Clarice Starling mới là động cơ thật của câu chuyện.\"],\"start\":0,\"opening\":true},{\"kind\":\"list\",\"items\":[\"Hannibal Lecter đáng sợ vì hắn vừa thông tuệ vừa lịch thiệp.\",\"Ta đối diện nỗi sợ như cách Clarice đối diện tiếng kêu của bầy cừu.\"],\"start\":2,\"opening\":false},{\"kind\":\"list\",\"items\":[\"Cái ác ở đây riêng tư, thuộc về tâm lý — không hề cường điệu.\"],\"start\":4,\"opening\":false},{\"kind\":\"end\"}]},\"date\":\"\",\"readingTime\":\"\",\"tags\":[]},{\"slug\":\"48-laws-of-power\",\"blogSlug\":\"$undefined\",\"meta\":{\"slug\":\"48-laws-of-power\",\"title\":\"48 Nguyên Tắc Chủ Chốt Của Quyền Lực\",\"titleEn\":\"The 48 Laws of Power\",\"author\":\"Robert Greene\",\"cover\":\"/books/48-laws-of-power.jpg\",\"coverBack\":\"/books/48-laws-of-power-back.jpg\",\"hue\":0,\"saturation\":30,\"lightness\":12,\"foil\":\"#CFCFCF\",\"scale\":1.12,\"coverNote\":{\"en\":\"Sức mạnh không đến từ sự may mắn hay tài năng thiên bẩm. Nó đến từ việc thấu hiểu luật chơi. Khám phá những bí mật cốt lõi để làm chủ cuộc sống, kiểm soát tình huống và trở thành người nắm giữ cuộc chơi.\",\"vi\":\"Sức mạnh không đến từ sự may mắn hay tài năng thiên bẩm. Nó đến từ việc thấu hiểu luật chơi. Khám phá những bí mật cốt lõi để làm chủ cuộc sống, kiểm soát tình huống và trở thành người nắm giữ cuộc chơi.\"},\"keyPoints\":{\"en\":[\"Nói ít hơn mức cần thiết để tạo sự tò mò, bí ẩn và tôn trọng.\",\"Che đậy ý định để đối thủ không thể đoán trước và phòng bị.\",\"Đừng chơi trội quan thầy; hãy làm cấp trên thấy an toàn.\",\"Chiến thắng bằng hành động và kết quả, không bằng tranh cãi.\",\"Biến hóa linh hoạt như nước để thích ứng với mọi hoàn cảnh.\"],\"vi\":[\"Nói ít hơn mức cần thiết để tạo sự tò mò, bí ẩn và tôn trọng.\",\"Che đậy ý định để đối thủ không thể đoán trước và phòng bị.\",\"Đừng chơi trội quan thầy; hãy làm cấp trên thấy an toàn.\",\"Chiến thắng bằng hành động và kết quả, không bằng tranh cãi.\",\"Biến hóa linh hoạt như nước để thích ứng với mọi hoàn cảnh.\"]},\"readingPages\":{\"en\":[{\"heading\":\"Bậc Thầy Của Sự Bí Ẩn\",\"paragraphs\":[\"Lời nói càng ít, ý nghĩa càng sâu sắc. Sự bí ẩn chính là vũ khí sắc bén nhất của quyền lực.\",\"Nguyên lý cốt lõi: Nói ít hơn mức cần thiết. Lời nói thừa thãi dễ làm lộ điểm yếu. Im lặng tạo ra sự tò mò, bí ẩn và sự tôn trọng từ người khác.\",\"Che đậy ý định. Đừng bao giờ lật ngửa các lá bài của mình. Khi đối thủ không đoán được bạn muốn gì, họ không thể phòng bị.\",\"Sử dụng sự khan hiếm. Sự hiện diện quá thường xuyên làm giảm giá trị của bạn. Hãy biết cách \\\"biến mất\\\" đúng lúc để người khác phải khao khát sự có mặt của bạn.\",\"Ví dụ thực tế: Hãy nghĩ về những lần ra mắt sản phẩm của Apple dưới thời Steve Jobs. Họ luôn giữ bí mật tuyệt đối về thiết kế và tính năng cho đến phút chót. Không ai biết họ sẽ làm gì tiếp theo, và chính sự bí ẩn đó khiến cả thế giới phải chờ đợi và bùng nổ khi sản phẩm được công bố. Trong công sở, một người điềm tĩnh, ít nói và chỉ lên tiếng khi thật sự cần thiết luôn có tiếng nói nặng ký và sự uy nghiêm hơn hẳn người luôn bô bô mọi thứ.\"]},{\"heading\":\"Nghệ Thuật Mượn Lực \u0026 Giữ Vị Thế\",\"paragraphs\":[\"Người thông minh không tự làm mọi việc. Họ biết cách tận dụng nguồn lực xung quanh để vinh thân.\",\"Nguyên lý cốt lõi: Đừng bao giờ chơi trội quan thầy. Hãy làm cho cấp trên cảm thấy họ giỏi giang và an toàn. Nếu bạn tỏ ra quá xuất chúng và lấn át, bạn sẽ trở thành cái gai trong mắt họ.\",\"Làm cho người khác phụ thuộc vào mình. Hãy sở hữu một kỹ năng độc nhất mà không ai thay thế được. Khi tổ chức hoặc người khác cần bạn để tồn tại, bạn nắm quyền kiểm soát.\",\"Tận dụng nguồn lực. Tận dụng chất xám và thời gian của người khác để đạt mục tiêu, nhưng hãy khéo léo để họ vẫn cảm thấy được trân trọng.\",\"Ví dụ thực tế: Trong một công ty, có những nhân viên rất giỏi nhưng luôn bị trù dập vì họ thích thể hiện và làm lu mờ sếp. Ngược lại, người khôn ngoan biết cách dùng tài năng của mình để giúp sếp tỏa sáng và thăng tiến, từ đó họ cũng được cất nhắc theo. Hãy trở thành \\\"chìa khóa giải quyết vấn đề\\\" độc quyền mà công ty không thể thiếu. Khi công ty phụ thuộc vào bạn, quyền lực tự động nằm trong tay bạn.\"]},{\"heading\":\"Hành Động Quyết Đoán \u0026 Biến Hóa Khôn Lường\",\"paragraphs\":[\"Thế giới không tưởng thưởng cho những lời giải thích. Nó tưởng thưởng cho kết quả và sự linh hoạt.\",\"Nguyên lý cốt lõi: Chiến thắng bằng hành động, không bằng tranh cãi. Tranh luận chỉ tổn thương cái tôi của người khác và tạo ra kẻ thù. Hãy dùng kết quả thực tế để chứng minh bạn đúng.\",\"Xuất chiêu táo bạo. Sự lưỡng lự chỉ bộc lộ điểm yếu. Một khi đã quyết định, hãy hành động với sự tự tin tuyệt đối để áp đảo tình thế.\",\"Thiên hình vạn trạng. Đừng bao giờ đóng khung mình vào một hình tượng hay chiến thuật duy nhất. Nước không có hình dạng cố định nhưng có thể cuốn trôi mọi thứ. Hãy linh hoạt thích ứng với mọi hoàn cảnh.\",\"Ví dụ thực tế: Thay vì cãi nhau với đồng nghiệp hay sếp rằng ý tưởng của bạn tốt hơn, hãy lẳng lặng làm một bản demo thực tế hoặc một thử nghiệm nhỏ và đưa ra kết quả. Khi đó không ai có thể chối cãi. Trong thời đại AI và công nghệ thay đổi chóng mặt, những cá nhân cố chấp với cách làm cũ sẽ bị đào thải. Những người biết linh hoạt như dòng nước, sẵn sàng học hỏi cái mới và thay đổi cách làm việc sẽ tiếp tục vươn lên và dẫn đầu.\"]}],\"vi\":[{\"heading\":\"Bậc Thầy Của Sự Bí Ẩn\",\"paragraphs\":[\"Lời nói càng ít, ý nghĩa càng sâu sắc. Sự bí ẩn chính là vũ khí sắc bén nhất của quyền lực.\",\"Nguyên lý cốt lõi: Nói ít hơn mức cần thiết. Lời nói thừa thãi dễ làm lộ điểm yếu. Im lặng tạo ra sự tò mò, bí ẩn và sự tôn trọng từ người khác.\",\"Che đậy ý định. Đừng bao giờ lật ngửa các lá bài của mình. Khi đối thủ không đoán được bạn muốn gì, họ không thể phòng bị.\",\"Sử dụng sự khan hiếm. Sự hiện diện quá thường xuyên làm giảm giá trị của bạn. Hãy biết cách \\\"biến mất\\\" đúng lúc để người khác phải khao khát sự có mặt của bạn.\",\"Ví dụ thực tế: Hãy nghĩ về những lần ra mắt sản phẩm của Apple dưới thời Steve Jobs. Họ luôn giữ bí mật tuyệt đối về thiết kế và tính năng cho đến phút chót. Không ai biết họ sẽ làm gì tiếp theo, và chính sự bí ẩn đó khiến cả thế giới phải chờ đợi và bùng nổ khi sản phẩm được công bố. Trong công sở, một người điềm tĩnh, ít nói và chỉ lên tiếng khi thật sự cần thiết luôn có tiếng nói nặng ký và sự uy nghiêm hơn hẳn người luôn bô bô mọi thứ.\"]},{\"heading\":\"Nghệ Thuật Mượn Lực \u0026 Giữ Vị Thế\",\"paragraphs\":[\"Người thông minh không tự làm mọi việc. Họ biết cách tận dụng nguồn lực xung quanh để vinh thân.\",\"Nguyên lý cốt lõi: Đừng bao giờ chơi trội quan thầy. Hãy làm cho cấp trên cảm thấy họ giỏi giang và an toàn. Nếu bạn tỏ ra quá xuất chúng và lấn át, bạn sẽ trở thành cái gai trong mắt họ.\",\"Làm cho người khác phụ thuộc vào mình. Hãy sở hữu một kỹ năng độc nhất mà không ai thay thế được. Khi tổ chức hoặc người khác cần bạn để tồn tại, bạn nắm quyền kiểm soát.\",\"Tận dụng nguồn lực. Tận dụng chất xám và thời gian của người khác để đạt mục tiêu, nhưng hãy khéo léo để họ vẫn cảm thấy được trân trọng.\",\"Ví dụ thực tế: Trong một công ty, có những nhân viên rất giỏi nhưng luôn bị trù dập vì họ thích thể hiện và làm lu mờ sếp. Ngược lại, người khôn ngoan biết cách dùng tài năng của mình để giúp sếp tỏa sáng và thăng tiến, từ đó họ cũng được cất nhắc theo. Hãy trở thành \\\"chìa khóa giải quyết vấn đề\\\" độc quyền mà công ty không thể thiếu. Khi công ty phụ thuộc vào bạn, quyền lực tự động nằm trong tay bạn.\"]},{\"heading\":\"Hành Động Quyết Đoán \u0026 Biến Hóa Khôn Lường\",\"paragraphs\":[\"Thế giới không tưởng thưởng cho những lời giải thích. Nó tưởng thưởng cho kết quả và sự linh hoạt.\",\"Nguyên lý cốt lõi: Chiến thắng bằng hành động, không bằng tranh cãi. Tranh luận chỉ tổn thương cái tôi của người khác và tạo ra kẻ thù. Hãy dùng kết quả thực tế để chứng minh bạn đúng.\",\"Xuất chiêu táo bạo. Sự lưỡng lự chỉ bộc lộ điểm yếu. Một khi đã quyết định, hãy hành động với sự tự tin tuyệt đối để áp đảo tình thế.\",\"Thiên hình vạn trạng. Đừng bao giờ đóng khung mình vào một hình tượng hay chiến thuật duy nhất. Nước không có hình dạng cố định nhưng có thể cuốn trôi mọi thứ. Hãy linh hoạt thích ứng với mọi hoàn cảnh.\",\"Ví dụ thực tế: Thay vì cãi nhau với đồng nghiệp hay sếp rằng ý tưởng của bạn tốt hơn, hãy lẳng lặng làm một bản demo thực tế hoặc một thử nghiệm nhỏ và đưa ra kết quả. Khi đó không ai có thể chối cãi. Trong thời đại AI và công nghệ thay đổi chóng mặt, những cá nhân cố chấp với cách làm cũ sẽ bị đào thải. Những người biết linh hoạt như dòng nước, sẵn sàng học hỏi cái mới và thay đổi cách làm việc sẽ tiếp tục vươn lên và dẫn đầu.\"]}]}},\"enTitle\":\"The 48 Laws of Power\",\"titles\":{\"en\":\"The 48 Laws of Power\",\"vi\":\"48 Nguyên Tắc Chủ Chốt Của Quyền Lực\"},\"descriptions\":{},\"bodies\":{},\"keyPoints\":{\"en\":\"$1b:props:books:3:meta:keyPoints:en\",\"vi\":\"$1b:props:books:3:meta:keyPoints:vi\"},\"coverNote\":{\"en\":\"Sức mạnh không đến từ sự may mắn hay tài năng thiên bẩm. Nó đến từ việc thấu hiểu luật chơi. Khám phá những bí mật cốt lõi để làm chủ cuộc sống, kiểm soát tình huống và trở thành người nắm giữ cuộc chơi.\",\"vi\":\"Sức mạnh không đến từ sự may mắn hay tài năng thiên bẩm. Nó đến từ việc thấu hiểu luật chơi. Khám phá những bí mật cốt lõi để làm chủ cuộc sống, kiểm soát tình huống và trở thành người nắm giữ cuộc chơi.\"},\"readingPages\":{\"en\":\"$1b:props:books:3:meta:readingPages:en\",\"vi\":\"$1b:props:books:3:meta:readingPages:vi\"},\"pages\":{\"en\":[{\"kind\":\"cover\"},{\"kind\":\"content\",\"heading\":\"Bậc Thầy , những cá nhân cố chấp với cách làm cũ sẽ bị đào thải. Những người biết linh hoạt như dòng nước, sẵn sàng học hỏi cái mới và thay đổi cách làm việc sẽ tiếp tục vươn lên và dẫn đầu.\"],\"opening\":false},{\"kind\":\"end\"}]},\"date\":\"\",\"readingTime\":\"\",\"tags\":[]},{\"slug\":\"thinking-fast-and-slow\",\"blogSlug\":\"$undefined\",\"meta\":{\"slug\":\"thinking-fast-and-slow\",\"title\":\"Tư Duy Nhanh Và Chậm\",\"titleEn\":\"Thinking, Fast and Slow\",\"author\":\"Daniel Kahneman\",\"cover\":\"/books/thinking-fast-and-slow.webp\",\"hue\":40,\"saturation\":12,\"lightness\":66,\"foil\":\"#4A463E\",\"scale\":1.08,\"keyPoints\":{\"en\":[\"Two systems run the mind: fast intuitive System 1, slow deliberate System 2.\",\"Most of the time we let the lazy fast brain decide — and it loves shortcuts.\",\"Biases like anchoring and availability quietly distort our judgments.\",\"We fear losses far more than we value equivalent gains.\",\"The remembering self, not the experiencing self, writes our life's story.\"],\"vi\":[\"Trí óc vận hành bằng hai hệ: Hệ 1 nhanh và trực giác, Hệ 2 chậm và lý trí.\",\"Phần lớn thời gian ta để bộ não nhanh lười biếng quyết định — và nó thích đi đường tắt.\",\"Các thiên kiến như mỏ neo và tính sẵn có âm thầm làm méo mó phán đoán.\",\"Ta sợ mất mát hơn nhiều so với niềm vui từ một khoản lợi tương đương.\",\"Cái tôi ghi nhớ, chứ không phải cái tôi trải nghiệm, viết nên câu chuyện đời ta.\"]}},\"enTitle\":\"Thinking, Fast and Slow\",\"titles\":{\"en\":\"Thinking, Fast and Slow\",\"vi\":\"Tư Duy Nhanh Và Chậm\"},\"descriptions\":{},\"bodies\":{},\"keyPoints\":{\"en\":\"$1b:props:books:4:meta:keyPoints:en\",\"vi\":\"$1b:props:books:4:meta:keyPoints:vi\"},\"coverNote\":{\"en\":\"$undefined\",\"vi\":\"$undefined\"},\"readingPages\":{\"en\":\"$undefined\",\"vi\":\"$undefined\"},\"pages\":{\"en\":[{\"kind\":\"cover\"},{\"kind\":\"list\",\"items\":[\"Two systems run the mind: fast intuitive System 1, slow deliberate System 2.\",\"Most of the time we let t i giản không phải đích đến; nó là công cụ để nhận ra điều thật sự quan trọng.\",\"Mỗi món đồ đều đòi một chút chú tâm; ít đồ hơn, hiện diện nhiều hơn.\",\"Hãy buông những thứ giữ lại 'phòng khi cần' và để níu con người cũ của mình.\",\"Ít đồ đạc lại nhường chỗ cho lòng biết ơn, thời gian và những người ta thương.\"]}},\"enTitle\":\"Goodbye, Things\",\"titles\":{\"en\":\"Goodbye, Things\",\"vi\":\"Lối Sống Tối Giản Của Người Nhật\"},\"descriptions\":{},\"bodies\":{},\"keyPoints\":{\"en\":\"$1b:props:books:5:meta:keyPoints:en\",\"vi\":\"$1b:props:books:5:meta:keyPoints:vi\"},\"coverNote\":{\"en\":\"$undefined\",\"vi\":\"$undefined\"},\"readingPages\":{\"en\":\"$undefined\",\"vi\":\"$undefined\"},\"pages\":{\"en\":[{\"kind\":\"cover\"},{\"kind\":\"list\",\"items\":[\"We don't need most of what we own — and owning less frees the mind.\",\"Minimalism isn't a goal; it's a tool for noticing what truly matters.\"],\"start\":0,\"opening\":true},{\"kind\":\"list\",\"items\":[\"Every object asks for a little attention; fewer things, more presence.\",\"Let go of the things you keep 'just in case' and for who you used to be.\"],\"start\":2,\"opening\":false},{\"kind\":\"list\",\"items\":[\"Less stuff makes room for gratitude, time, and the people you love.\"],\"start\":4,\"opening\":false},{\"kind\":\"end\"}],\"vi\":[{\"kind\":\"cover\"},{\"kind\":\"list\",\"items\":[\"Ta không cần phần lớn những thứ mình sở hữu — và sở hữu ít đi giúp tâm trí nhẹ nhõm.\",\"Tối giản không phải đích đến; nó là công cụ để nhận ra điều thật sự quan trọng.\"],\"start\":0,\"opening\":true},{\"kind\":\"list\",\"items\":[\"Mỗi món đồ đều đòi một chút chú tâm; ít đồ hơn, hiện diện nhiều hơn.\",\"Hãy buông những thứ giữ lại 'phòng khi cần' và để níu con người cũ của mình.\"],\"start\":2,\"opening\":false},{\"kind\":\"list\",\"items\":[\"Ít đồ đạc lại nhường chỗ cho lòng biết ơn, thời gian và những người ta thương.\"],\"start\":4,\"opening\":false},{\"kind\":\"end\"}]},\"date\":\"\",\"readingTime\":\"\",\"
